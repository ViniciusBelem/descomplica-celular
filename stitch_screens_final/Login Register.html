<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Descomplica Celular | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#8083ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-secondary-container": "#003f38",

                        "on-tertiary-fixed-variant": "#703700",
                        "primary": "#c0c1ff",
                        "on-error": "#690005",
                        "on-primary-container": "#0d0096",
                        "on-surface": "#e5e1e4",
                        "surface-tint": "#c0c1ff",
                        "secondary-container": "#04b4a2",
                        "inverse-on-surface": "#313032",
                        "surface-container-lowest": "#0e0e10",

                        "on-primary": "#1000a9",

                        "tertiary-fixed": "#ffdcc5",
                        "surface-container-low": "#1c1b1d",

                        "on-background": "#e5e1e4",

                        "on-secondary-fixed-variant": "#005048",

                        "on-tertiary-container": "#452000"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131315;
            color: #e5e1e4;
            overflow: hidden;
        }
        .cinematic-glow {
            box-shadow: 0 0 80px -10px rgba(192, 193, 255, 0.15);
        }
        .glass-panel {
            background: rgba(53, 52, 55, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(70, 69, 84, 0.15);
        }
        .input-focus-pill {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        input:focus + .input-focus-pill {
            height: 70%;
            background-color: #4fdbc8;
        }
        .mask-expand {
            clip-path: circle(0% at 50% 50%);
        }
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .geometric-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(70, 69, 84, 0.1) 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="flex min-h-screen w-full relative">
<!-- Left Side: Cinematic Visual -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-container-low items-center justify-center p-12">
<div class="absolute inset-0 geometric-bg opacity-40"></div>
<!-- 3D Geometric Abstract Element -->
<div class="relative z-10 w-full max-w-lg aspect-square flex items-center justify-center">
<div class="absolute w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] cinematic-glow"></div>
<div class="floating-element relative w-80 h-80 flex items-center justify-center">
<!-- Faux 3D Layers -->
<div class="absolute inset-0 border-[3px] border-primary/40 rounded-3xl rotate-12 scale-110 opacity-30"></div>
<div class="absolute inset-0 border-[1px] border-secondary/60 rounded-full -rotate-12 scale-90"></div>
<div class="relative w-64 h-64 bg-gradient-to-br from-primary to-primary-container rounded-2xl shadow-2xl flex items-center justify-center overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full opacity-20" data-alt="abstract flowing glass textures with deep indigo and violet light leaks and subtle noise grain" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA6qKgOpsPFMyeUImcSw9QXhQZDHr61KbyE19nzi7fxH5P3nsBslFe9vA3eGIWEKpbPzpgul11wakf-S-yreunHoy9X1E0kMkGdIeJcbKSINs1HOrkvVntCSlqUG78-9VPW-erZzIoSwDYFP9Vaq5kUxDwBwJohQDGcIKReCGWws5N-E6J14eJrTJn3aff8SXIyBnY5MLToxL2SNr-iLUE-mnf5_n0BbEv4ZuyP6V41PY-vWHiNPGUCEsj7WrbihZw31VUANmeZHRg'); background-size: cover;"></div>
<span class="material-symbols-outlined text-on-primary text-8xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="absolute -bottom-8 -right-8 w-32 h-32 bg-surface-container-highest glass-panel rounded-xl p-4 flex flex-col justify-end">
<div class="w-full h-1 bg-secondary rounded-full mb-2"></div>
<div class="w-2/3 h-1 bg-on-surface-variant/30 rounded-full mb-2"></div>
<div class="w-1/2 h-1 bg-on-surface-variant/30 rounded-full"></div>
</div>
</div>
</div>
<!-- Branding Overlay -->
<div class="absolute bottom-12 left-12">
<h1 class="text-primary font-headline font-black text-2xl tracking-tighter uppercase">Descomplica</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-widest uppercase opacity-60">Smart Advisor Platform</p>
</div>
</section>
<!-- Right Side: Interaction & Form -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 md:p-16 lg:p-24 bg-surface z-20">
<div class="w-full max-w-md">
<!-- Header -->
<header class="mb-10 text-left">
<h2 class="text-primary-fixed-dim font-headline font-bold text-[3.5rem] leading-tight tracking-[-0.04em] mb-4">
                        Bem-vindo.
                    </h2>
<p class="text-on-surface-variant text-lg leading-relaxed">
                        Acesse sua conta para gerenciar seus dispositivos com precisão técnica.
                    </p>
</header>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="group relative">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em] mb-2 px-1">Endereço de E-mail</label>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="nome@exemplo.com" type="email"/>
<div class="absolute right-4 text-secondary opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-xl">check_circle</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="group relative">
<div class="flex justify-between items-end mb-2 px-1">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em]">Senha de Acesso</label>
<a class="text-[0.6875rem] font-bold text-primary uppercase tracking-[0.05em] hover:text-primary-fixed-dim transition-colors" href="#">Esqueceu?</a>
</div>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="••••••••" type="password"/>
<div class="absolute right-4 text-on-surface-variant/50 cursor-pointer hover:text-on-surface">
<span class="material-symbols-outlined text-xl">visibility</span>
</div>
</div>
</div>
<!-- Login CTA -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-md shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all duration-400 flex items-center justify-center gap-2 group">
                        Entrar na Plataforma
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-12 pt-8 border-t border-outline-variant/10 flex flex-col gap-4">
<p class="text-on-surface-variant text-sm">
                        Novo por aqui? 
                        <a class="text-secondary font-semibold hover:underline decoration-secondary/30 underline-offset-4 ml-1" href="#">Crie sua conta agora</a>
</p>
<div class="flex items-center gap-4 mt-4">
<button class="flex-1 bg-surface-container-high py-3 rounded-md flex items-center justify-center gap-2 text-sm font-medium hover:bg-surface-variant transition-colors group">
<span class="w-5 h-5 bg-on-surface-variant/10 rounded-full flex items-center justify-center text-[10px]">G</span>
                            Google
                        </button>
<button class="flex-1 bg-surface-container-high py-3 rounded-md flex items-center justify-center gap-2 text-sm font-medium hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-lg">ios</span>
                            Apple
                        </button>
</div>
</div>
</div>
<!-- Accessibility/Language Toggle -->
<div class="absolute bottom-8 right-8 flex items-center gap-6">
<div class="flex items-center gap-2 text-on-surface-variant/50 text-[0.6875rem] font-bold uppercase tracking-widest cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">language</span>
                    PT-BR
                </div>
<div class="flex items-center gap-2 text-on-surface-variant/50 text-[0.6875rem] font-bold uppercase tracking-widest cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">contrast</span>
                    Acessibilidade
                </div>
</div>
</section>
</main>
<!-- Navigation Shell Suppression: This is a focused transactional page. No SideNav or BottomNavBar rendered. -->
<!-- Expansion Overlay for redirection simulation -->
<div class="fixed inset-0 pointer-events-none z-[100] flex items-center justify-center">
<div class="mask-expand w-[200vw] h-[200vw] bg-primary-fixed-dim transition-all duration-[1200ms] ease-[cubic-bezier(0.95,0.05,0.795,0.035)]"></div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 w-[600px] h-[600px] bg-secondary/5 blur-[150px] rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-primary/5 blur-[120px] rounded-full translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
</body></html>
