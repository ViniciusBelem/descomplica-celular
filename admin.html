<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin | Descomplica Celular</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/forms.css" />
  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="stylesheet" href="./css/toast.css" />
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-brand">
      <div class="site-brand__mark">DC</div>
      <div class="site-brand__text">
        <span class="site-brand__title">Admin V1</span>
      </div>
    </div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" data-view="dashboard">Visão Geral</button>
      <button class="admin-nav-item" data-view="catalog">Catálogo de Produtos</button>
      <a href="./index.html" class="admin-nav-item" style="margin-top: auto;">Voltar ao Site</a>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <h1 class="admin-page-title" id="admin-page-title">Visão Geral</h1>
      <div class="admin-header-actions" id="admin-header-actions"></div>
    </header>

    <div class="admin-content" id="admin-content">
      <!-- Conteúdo injetado via JS -->
    </div>
  </main>

  <!-- Modal de Formulário do Produto -->
  <div class="admin-modal" id="product-modal" aria-hidden="true">
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-panel">
      <div class="admin-modal-header">
        <h2 class="form-title" id="modal-title">Novo Produto</h2>
        <button class="btn btn-ghost" data-close-modal>Fechar</button>
      </div>
      
      <form id="product-form" class="form-stack">
        <input type="hidden" name="id" />
        <input type="hidden" name="slug" />
        
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Marca</label><input type="text" class="input" name="brand" required /></div>
          <div class="form-group"><label class="form-label">Modelo</label><input type="text" class="input" name="model" required /></div>
          <div class="form-group"><label class="form-label">Preço (R$)</label><input type="number" class="input" name="price" step="0.01" required /></div>
          <div class="form-group">
            <label class="form-label">Segmento</label>
            <select class="select" name="segment" required>
              <option value="entrada">Entrada</option>
              <option value="intermediario">Intermediário</option>
              <option value="intermediario-premium">Intermediário Premium</option>
              <option value="premium">Premium</option>
              <option value="ultra-premium">Ultra Premium</option>
            </select>
          </div>
          <div class="form-group form-group--full"><label class="form-label">URL da Imagem</label><input type="url" class="input" name="image" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Resumo do Aparelho</label><textarea class="textarea" name="summary" rows="2" required></textarea></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Configuração de Destaque</h3>
        <div class="form-grid">
          <label class="form-group form-group--full" style="flex-direction: row; align-items: center; cursor: pointer;">
            <input type="checkbox" name="active" checked style="width: 1.5rem; height: 1.5rem;" />
            <span class="form-label" style="margin: 0;">Aparelho Ativo (Visível na loja)</span>
          </label>
          <label class="form-group form-group--full" style="flex-direction: row; align-items: center; cursor: pointer;">
            <input type="checkbox" name="featured" style="width: 1.5rem; height: 1.5rem;" />
            <span class="form-label" style="margin: 0;">Aparelho em Destaque (Ganhará uma Badge)</span>
          </label>
          <div class="form-group form-group--full"><label class="form-label">Texto da Badge (Ex: Custo Benefício)</label><input type="text" class="input" name="badge" /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Especificações Técnicas</h3>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Tela</label><input type="text" class="input" name="specs.screen" required /></div>
          <div class="form-group"><label class="form-label">Processador</label><input type="text" class="input" name="specs.chipset" required /></div>
          <div class="form-group"><label class="form-label">Bateria</label><input type="text" class="input" name="specs.battery" required /></div>
          <div class="form-group"><label class="form-label">Memória RAM</label><input type="text" class="input" name="specs.memory" required /></div>
          <div class="form-group"><label class="form-label">Armazenamento</label><input type="text" class="input" name="specs.storage" required /></div>
          <div class="form-group"><label class="form-label">Câmera Principal</label><input type="text" class="input" name="specs.cameraMain" required /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Motor de Recomendação (Notas 0 a 100)</h3>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Câmera</label><input type="number" class="input" name="scores.camera" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Performance</label><input type="number" class="input" name="scores.performance" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Bateria</label><input type="number" class="input" name="scores.battery" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Tela</label><input type="number" class="input" name="scores.display" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Durabilidade</label><input type="number" class="input" name="scores.durability" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Longevidade</label><input type="number" class="input" name="scores.longevity" min="0" max="100" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Custo Benefício Geral</label><input type="number" class="input" name="scores.costBenefit" min="0" max="100" required /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Tags do Sistema (Separar por vírgula)</h3>
        <div class="form-grid" style="margin-bottom: 2rem;">
          <div class="form-group form-group--full"><label class="form-label">Tags de Foco</label><input type="text" class="input" name="focusTags" placeholder="camera, bateria, equilibrio" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Tags de Perfil</label><input type="text" class="input" name="profileTags" placeholder="intermediario, premium" required /></div>
        </div>

        <div class="form-actions" style="position: sticky; bottom: 0; background: var(--bg-card-elevated); padding-block: 1rem; border-top: 1px solid var(--border-soft); z-index: 10;">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Produto</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de Detalhes da Auditoria -->
  <div class="admin-modal" id="audit-modal" aria-hidden="true">
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-panel" style="max-width: 800px;">
      <div class="admin-modal-header">
        <h2 class="form-title">Detalhes da Alteração</h2>
        <button class="btn btn-ghost" data-close-modal>Fechar</button>
      </div>
      <div id="audit-modal-content" style="padding-bottom: 1.5rem;"></div>
    </div>
  </div>

  <script type="module" src="./js/admin-controller.js"></script>
</body>
</html>
