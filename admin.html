<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin | Descomplica Celular</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/forms.css" />
  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="stylesheet" href="./css/toast.css" />
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-brand">
      <div class="site-brand__mark">DC</div>
      <div class="site-brand__text">
        <span class="site-brand__title">Admin V1</span>
      </div>
    </div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" data-view="dashboard">Visão Geral</button>
      <button class="admin-nav-item" data-view="catalog">Catálogo de Produtos</button>
      <a href="./index.html" class="admin-nav-item" style="margin-top: auto;">Voltar ao Site</a>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <h1 class="admin-page-title" id="admin-page-title">Visão Geral</h1>
      <div style="display:flex; gap: 1rem; align-items:center;">
        <div class="admin-header-actions" id="admin-header-actions"></div>
        <button id="btn-inbox-header" class="btn btn-ghost" style="position:relative; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; background: var(--bg-card); border: 1px solid var(--border-soft); font-size:1.4rem; cursor:pointer;" title="Caixa de Mensagens">
           🔔
           <span id="inbox-badge" style="display:none; position:absolute; top:-2px; right:-2px; background:var(--red-400); color:white; font-size:9px; font-weight:800; border-radius:10px; padding:2px 5px; min-width:18px;">0</span>
        </button>
      </div>
    </header>

    <div class="admin-content" id="admin-content">
      <!-- Conteúdo injetado via JS -->
    </div>
  </main>

  <!-- Modal de Formulário do Produto -->
  <div class="admin-modal" id="product-modal" aria-hidden="true">
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-panel">
      <div class="admin-modal-header">
        <h2 class="form-title" id="modal-title">Novo Produto</h2>
        <button class="btn btn-ghost" data-close-modal>Fechar</button>
      </div>
      
      <form id="product-form" class="form-stack">
        <input type="hidden" name="id" />
        <input type="hidden" name="slug" />
        
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Marca</label><input type="text" class="input" name="brand" required /></div>
          <div class="form-group"><label class="form-label">Modelo</label><input type="text" class="input" name="model" required /></div>
          <div class="form-group"><label class="form-label">Preço (R$)</label><input type="number" class="input" name="price" step="0.01" required /></div>
          <div class="form-group">
            <label class="form-label">Segmento</label>
            <select class="select" name="segment" required>
              <option value="entrada">Entrada</option>
              <option value="intermediario">Intermediário</option>
              <option value="intermediario-premium">Intermediário Premium</option>
              <option value="premium">Premium</option>
              <option value="ultra-premium">Ultra Premium</option>
            </select>
          </div>
          <div class="form-group form-group--full"><label class="form-label">URL da Imagem</label><input type="url" class="input" name="image" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Resumo do Aparelho</label><textarea class="textarea" name="summary" rows="2" required></textarea></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Configuração de Destaque</h3>
        <div class="form-grid">
          <label class="form-group form-group--full" style="flex-direction: row; align-items: center; cursor: pointer;">
            <input type="checkbox" name="active" checked style="width: 1.5rem; height: 1.5rem;" />
            <span class="form-label" style="margin: 0;">Aparelho Ativo (Visível na loja)</span>
          </label>
          <label class="form-group form-group--full" style="flex-direction: row; align-items: center; cursor: pointer;">
            <input type="checkbox" name="featured" style="width: 1.5rem; height: 1.5rem;" />
            <span class="form-label" style="margin: 0;">Aparelho em Destaque (Ganhará uma Badge)</span>
          </label>
          <div class="form-group form-group--full"><label class="form-label">Texto da Badge (Ex: Custo Benefício)</label><input type="text" class="input" name="badge" /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Especificações Técnicas</h3>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Tela</label><input type="text" class="input" name="specs.screen" required /></div>
          <div class="form-group"><label class="form-label">Processador</label><input type="text" class="input" name="specs.chipset" required /></div>
          <div class="form-group"><label class="form-label">Bateria</label><input type="text" class="input" name="specs.battery" required /></div>
          <div class="form-group"><label class="form-label">Memória RAM</label><input type="text" class="input" name="specs.memory" required /></div>
          <div class="form-group"><label class="form-label">Armazenamento</label><input type="text" class="input" name="specs.storage" required /></div>
          <div class="form-group"><label class="form-label">Câmera Principal</label><input type="text" class="input" name="specs.cameraMain" required /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Motor de Recomendação (Notas 0 a 100)</h3>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Câmera</label><input type="number" class="input" name="scores.camera" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Performance</label><input type="number" class="input" name="scores.performance" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Bateria</label><input type="number" class="input" name="scores.battery" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Tela</label><input type="number" class="input" name="scores.display" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Durabilidade</label><input type="number" class="input" name="scores.durability" min="0" max="100" required /></div>
          <div class="form-group"><label class="form-label">Longevidade</label><input type="number" class="input" name="scores.longevity" min="0" max="100" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Custo Benefício Geral</label><input type="number" class="input" name="scores.costBenefit" min="0" max="100" required /></div>
        </div>

        <hr>
        <h3 class="form-title" style="font-size: var(--fs-lg);">Tags do Sistema (Separar por vírgula)</h3>
        <div class="form-grid" style="margin-bottom: 2rem;">
          <div class="form-group form-group--full"><label class="form-label">Tags de Foco</label><input type="text" class="input" name="focusTags" placeholder="camera, bateria, equilibrio" required /></div>
          <div class="form-group form-group--full"><label class="form-label">Tags de Perfil</label><input type="text" class="input" name="profileTags" placeholder="intermediario, premium" required /></div>
        </div>

        <div class="form-actions" style="position: sticky; bottom: 0; background: var(--bg-card-elevated); padding-block: 1rem; border-top: 1px solid var(--border-soft); z-index: 10;">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Produto</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de Detalhes da Auditoria -->
  <div class="admin-modal" id="audit-modal" aria-hidden="true">
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-panel" style="max-width: 800px;">
      <div class="admin-modal-header">
        <h2 class="form-title">Detalhes da Alteração</h2>
        <button class="btn btn-ghost" data-close-modal>Fechar</button>
      </div>
      <div id="audit-modal-content" style="padding-bottom: 1.5rem;"></div>
    </div>
  </div>

  <!-- Modal Avançado de Comunicação e Anotações (Inbox/Outbox/Notes) -->
  <div class="admin-modal" id="inbox-modal" aria-hidden="true" style="z-index: 1000;">
    <div class="admin-modal-backdrop" data-close-inbox></div>
    <div class="admin-modal-panel" style="max-width: 900px; width: 95%; height: 85vh; display: flex; flex-direction: column; padding: 0; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border-soft);">
      
      <div style="display: flex; height: 100%;">
        <!-- Sidebar de Abas (Vertical Tabs) -->
        <div style="width: 260px; background: var(--bg-card-elevated); border-right: 1px solid var(--border-soft); display: flex; flex-direction: column;">
          <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-soft);">
             <h2 style="margin:0; font-size:1.15rem; display:flex; align-items:center; gap:0.5rem; color:var(--text-primary); font-weight:600;">📬 Comunicação B2B</h2>
          </div>
          <style>
             .inbox-tab { padding: 1rem 1.5rem; border: none; background: transparent; color: var(--text-muted); text-align: left; cursor: pointer; display: flex; align-items: center; gap: 0.8rem; font-size: 0.95rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
             .inbox-tab:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }
             .inbox-tab.active { background: rgba(255,255,255,0.05); border-left-color: var(--brand-primary); color: var(--brand-primary); }
          </style>
          <nav id="inbox-tabs" style="display: flex; flex-direction: column; padding: 1rem 0;">
             <button class="inbox-tab active" data-tab="inbox"><span style="font-size:1.2rem;">📥</span> Caixa de Entrada</button>
             <button class="inbox-tab" data-tab="outbox"><span style="font-size:1.2rem;">📤</span> Itens Enviados</button>
             <button class="inbox-tab" data-tab="notes"><span style="font-size:1.2rem;">📝</span> Minhas Anotações</button>
             <button class="inbox-tab" data-tab="trash"><span style="font-size:1.2rem;">🗑️</span> Lixeira Oculta</button>
          </nav>
          <div style="padding: 1.5rem; margin-top: auto; border-top: 1px solid var(--border-soft);">
             <button class="btn btn-primary" id="btn-compose-global" style="width:100%; justify-content:center;">➕ Cadastrar Nota/Msg</button>
          </div>
        </div>
        
        <!-- Conteúdo da Aba Dinâmico -->
        <div style="flex-grow: 1; display:flex; flex-direction: column; background: var(--bg-card); position:relative;">
           <div style="padding: 1rem 2rem; border-bottom: 1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center;">
              <h3 id="inbox-pane-title" style="margin:0; color:var(--text-primary); font-size:1.1rem; font-weight: 600;">Carregando...</h3>
              <button class="btn btn-ghost" data-close-inbox style="font-weight:bold; font-size:1.2rem; padding: 0.2rem 0.6rem;">✕</button>
           </div>
           <!-- Tela Listagem -->
           <div id="inbox-pane-content" style="flex-grow:1; overflow-y:auto; padding: 1.5rem 2rem; scrollbar-width: thin;">
              <!-- Cards Injetados Via JS -->
           </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal do Editor de Texto Rico (Rich Text Editor) -->
  <div class="admin-modal" id="rich-note-modal" aria-hidden="true" style="z-index: 1050;">
    <div class="admin-modal-backdrop" data-close-note></div>
    <div class="admin-modal-panel" style="max-width: 750px; width: 95%; background: var(--bg-card);">
       <div class="admin-modal-header" style="border-bottom: 1px solid var(--border-soft); padding-bottom: 1rem;">
         <h2 class="form-title" style="margin:0; font-size:1.2rem; display:flex; align-items:center; gap:0.6rem;"><i class="gg-pen" style="--ggs: 1.1; color: var(--brand-primary); margin-left: 4px;"></i> Editor de Anotação</h2>
         <button class="btn btn-ghost" data-close-note>Fechar</button>
       </div>
       <form id="rich-note-form" style="padding-top: 1.5rem; display:flex; flex-direction:column; gap:1.2rem;">
          <input type="hidden" id="note-ref-log" />
          <input type="hidden" id="note-id" />
          
          <div class="form-group" style="display:grid; grid-template-columns: 1fr 2fr; gap:1rem; background: var(--bg-card-elevated); padding: 1rem; border-radius: 8px; border: 1px solid var(--border-soft);">
              <div style="display:flex; flex-direction:column; justify-content:center;">
                 <label class="form-label" style="margin:0; font-weight:600;">Classe do Registro</label>
                 <span style="font-size:0.75rem; color:var(--text-muted);">Defina o tipo de visibilidade.</span>
              </div>
              <select id="note-type" class="select" required style="border:1px solid var(--brand-primary);">
                 <option value="private">🔒 Registro Privado (Apenas Eu)</option>
                 <option value="public">📨 Registro Transmissível (Enviar para Outro)</option>
              </select>
          </div>
          
          <div class="form-group" id="note-target-wrapper" style="display:none; grid-template-columns: 1fr 2fr; gap:1rem; padding: 0 1rem;">
              <label class="form-label" style="margin:0; display:flex; align-items:center;">E-mail do Destinatário</label>
              <input type="email" id="note-target-email" class="input" placeholder="auditor@empresa.com" />
          </div>
          
          <div class="form-group">
              <input type="text" id="note-subject" class="input" placeholder="Assunto / Título do Contexto" required style="font-size: 1.1rem; font-weight: 500; border-color: var(--border-soft);" />
          </div>
          
          <!-- Barra de Ferramentas WYSIWYG -->
          <div style="border: 1px solid var(--border-soft); border-radius: 8px; overflow:hidden;">
              <div id="rich-editor-toolbar" style="background: var(--bg-card-elevated); padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border-soft); display:flex; flex-wrap:wrap; gap:0.4rem; align-items:center;">
                 <select id="rt-font" class="select" style="padding:0.25rem; height:auto; width:130px; font-size:0.75rem; border-color:var(--border-soft); background:transparent;">
                   <option value="Inter">Sistema (Inter)</option>
                   <option value="Arial">Legado (Arial)</option>
                   <option value="Verdana">Sólida (Verdana)</option>
                   <option value="Times New Roman">Documento (Times)</option>
                   <option value="Courier New">Código (Courier)</option>
                   <option value="Georgia">Editorial (Georgia)</option>
                 </select>
                 <select id="rt-size" class="select" style="padding:0.25rem; height:auto; width:65px; font-size:0.75rem; border-color:var(--border-soft); background:transparent;">
                   <option value="1">10px</option>
                   <option value="2">13px</option>
                   <option value="3" selected>16px</option>
                   <option value="4">18px</option>
                   <option value="5">24px</option>
                   <option value="6">32px</option>
                 </select>
                 <div style="height:20px; width:1px; background:var(--border-soft); margin:0 4px;"></div>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; min-width:32px; font-weight:bold; border-radius:4px;" onclick="document.execCommand('bold', false, null)">B</button>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; min-width:32px; font-style:italic; font-family:serif; border-radius:4px;" onclick="document.execCommand('italic', false, null)">I</button>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; min-width:32px; text-decoration:underline; border-radius:4px;" onclick="document.execCommand('underline', false, null)">U</button>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; min-width:32px; text-decoration:line-through; border-radius:4px;" onclick="document.execCommand('strikeThrough', false, null)">S</button>
                 <div style="position:relative; display:flex; align-items:center;">
                    <span style="font-size:0.75rem; position:absolute; bottom:-10px; left:2px; pointer-events:none;">Cor</span>
                    <input type="color" id="rt-color" style="width:28px; height:28px; padding:0; border:none; background:none; cursor:pointer;" title="Cor do Texto" />
                 </div>
                 <div style="height:20px; width:1px; background:var(--border-soft); margin:0 4px;"></div>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; font-size:0.85rem; border-radius:4px;" onclick="document.execCommand('insertUnorderedList', false, null)">• Tópicos</button>
                 <button type="button" class="btn btn-ghost" style="padding:0.2rem 0.6rem; font-size:0.85rem; border-radius:4px;" onclick="document.execCommand('insertOrderedList', false, null)">1. Lista Num</button>
              </div>
              <!-- Área Editável -->
              <div id="note-body" contenteditable="true" style="min-height: 250px; max-height: 50vh; overflow-y:auto; padding: 1.5rem; outline:none; background:var(--bg-card); color:var(--text-primary); line-height:1.6; font-family:'Inter', sans-serif;"></div>
          </div>
          
          <div style="display:flex; justify-content:flex-end; gap:0.8rem; margin-top:0.5rem;">
             <button type="button" class="btn btn-secondary" data-close-note>Descartar</button>
             <button type="submit" class="btn btn-primary" id="btn-save-note">Publicar Registro / Enviar</button>
          </div>
       </form>
    </div>
  </div>

  <script type="module" src="./js/admin-controller.js"></script>
</body>
</html>
