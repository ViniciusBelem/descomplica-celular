<meta name="description" content="Crie sua conta no Descomplica Celular para descobrir o seu smartphone ideal e ter análises baseadas no seu perfil."/>

<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #131315; color: #e5e1e4; overflow: hidden; }
        .cinematic-glow { box-shadow: 0 0 80px -10px rgba(192, 193, 255, 0.15); }
        .glass-panel { background: rgba(53, 52, 55, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(70, 69, 84, 0.15); }
        .input-focus-pill { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        input:focus + .input-focus-pill { height: 70%; background-color: #4fdbc8; }
        .mask-expand { clip-path: circle(0% at 50% 50%); }
        .floating-element { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .geometric-bg { background-image: radial-gradient(circle at 2px 2px, rgba(70, 69, 84, 0.1) 1px, transparent 0); background-size: 32px 32px; }
    </style>
</head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="flex min-h-screen w-full relative">
<!-- Left Side: Cinematic Visual -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-container-low items-center justify-center p-12">
<div class="absolute inset-0 geometric-bg opacity-40"></div>
<div class="relative z-10 w-full max-w-lg aspect-square flex items-center justify-center">
<div class="absolute w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] cinematic-glow"></div>
<div class="floating-element relative w-80 h-80 flex items-center justify-center">
<div class="absolute inset-0 border-[3px] border-primary/40 rounded-3xl rotate-12 scale-110 opacity-30"></div>
<div class="absolute inset-0 border-[1px] border-secondary/60 rounded-full -rotate-12 scale-90"></div>
<div class="relative w-64 h-64 bg-gradient-to-br from-primary to-primary-container rounded-2xl shadow-2xl flex items-center justify-center overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full opacity-20" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA6qKgOpsPFMyeUImcSw9QXhQZDHr61KbyE19nzi7fxH5P3nsBslFe9vA3eGIWEKpbPzpgul11wakf-S-yreunHoy9X1E0kMkGdIeJcbKSINs1HOrkvVntCSlqUG78-9VPW-erZzIoSwDYFP9Vaq5kUxDwBwJohQDGcIKReCGWws5N-E6J14eJrTJn3aff8SXIyBnY5MLToxL2SNr-iLUE-mnf5_n0BbEv4ZuyP6V41PY-vWHiNPGUCEsj7WrbihZw31VUANmeZHRg'); background-size: cover;"></div>
<span class="material-symbols-outlined text-on-primary text-8xl" style="font-variation-settings: 'FILL' 1;">person_add</span>
</div>
<div class="absolute -bottom-8 -right-8 w-32 h-32 bg-surface-container-highest glass-panel rounded-xl p-4 flex flex-col justify-end">
<div class="w-full h-1 bg-secondary rounded-full mb-2"></div>
<div class="w-2/3 h-1 bg-on-surface-variant/30 rounded-full mb-2"></div>
<div class="w-1/2 h-1 bg-on-surface-variant/30 rounded-full"></div>
</div>
</div>
</div>
<div class="absolute bottom-12 left-12">
<h1 class="text-primary font-headline font-black text-2xl tracking-tighter uppercase">Descomplica</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-widest uppercase opacity-60">Smart Advisor Platform</p>
</div>
</section>

<!-- Right Side: Interaction & Form -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center p-6 md:p-12 lg:p-24 bg-surface z-20 overflow-y-auto max-h-screen">
<div class="w-full max-w-md my-auto pb-10 pt-10 lg:pt-0">
<header class="mb-10 text-left">
<h2 class="text-primary-fixed-dim font-headline font-bold text-[3rem] md:text-[3.5rem] leading-tight tracking-[-0.04em] mb-4">Criar Conta.</h2>
<p class="text-on-surface-variant text-lg leading-relaxed">Junte-se à revolução na recomendação técnica de smartphones.</p>
</header>

<div data-auth-flash class="mb-4"></div>

<form id="register-form" class="space-y-5" novalidate>
<div class="group relative">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em] mb-2 px-1">Seu Nome Completo</label>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input id="register-name" class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="Ex: Felipe Silva" type="text" autocomplete="name" required/>
<div class="absolute right-4 text-secondary opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-xl">person</span>
</div>
</div>
</div>

<div class="group relative">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em] mb-2 px-1">Endereço de E-mail</label>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input id="register-email" class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="nome@exemplo.com" type="email" autocomplete="email" required/>
<div class="absolute right-4 text-secondary opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
</div>
</div>

<div class="group relative">
<div class="flex justify-between items-end mb-2 px-1">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em]">Sua Senha</label>
</div>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input id="register-password" class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="Mínimo 6 caracteres" type="password" autocomplete="new-password" required/>
<div class="absolute right-4 text-on-surface-variant/50 cursor-pointer hover:text-on-surface">
<span class="material-symbols-outlined text-xl">visibility</span>
</div>
</div>
</div>

<div class="group relative">
<div class="flex justify-between items-end mb-2 px-1">
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em]">Confirme a Senha</label>
</div>
<div class="relative flex items-center">
<div class="input-focus-pill absolute left-0 w-[2px] h-0 bg-transparent rounded-full"></div>
<input id="register-confirm-password" class="w-full bg-surface-container-low border-none rounded-md py-4 px-6 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-0 focus:bg-surface-container-highest transition-all duration-400 font-body outline-none" placeholder="Repita sua senha" type="password" autocomplete="new-password" required/>
</div>
</div>

<div id="register-feedback" class="text-sm font-semibold text-error"></div>

<button id="register-submit" type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-md shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all duration-400 flex items-center justify-center gap-2 group mt-4">
Finalizar Cadastro
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">how_to_reg</span>
</button>
</form>

<div class="mt-8 pt-8 border-t border-outline-variant/10 flex flex-col gap-4">
<p class="text-on-surface-variant text-sm">
Já possui conta? 
<a class="text-secondary font-semibold hover:underline decoration-secondary/30 underline-offset-4 ml-1" href="./login.html">Fazer Login</a>
</p>
<p class="text-on-surface-variant text-sm">
<a class="text-on-surface-variant/70 font-medium hover:text-primary transition-colors hover:underline decoration-secondary/30 underline-offset-4" href="./index.html">Voltar para o Catálogo / Início</a>
</p>
</div>
</div>
</section>
</main>

<div class="fixed top-0 right-0 w-[600px] h-[600px] bg-secondary/5 blur-[150px] rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-primary/5 blur-[120px] rounded-full translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>

<!-- Core System Mechanics -->
<script type="module" src="./js/global-auth.js"></script>
<script type="module" src="./js/registro.js"></script>
</body>
</html>
